name: Deploy to Production (VPS)

# Migrated off Render 2026-06-06. RivaFlow now runs on the pai-relay VPS.
# Model: push to main -> tests + security gates here -> the VPS auto-pulls main
# via deploy.sh (read-only deploy key, cron), rebuilds, health-checks, auto-rolls-back.
# No inbound SSH / no self-hosted runner on the host (which also runs Groot).

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - '!.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  tests:
    name: Run Full Test Suite
    uses: ./.github/workflows/test.yml

  security:
    name: Security Checks
    uses: ./.github/workflows/security.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  deploy:
    name: Verify VPS deploy
    runs-on: ubuntu-latest
    needs: [tests, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Info
        run: |
          echo "Gates passed for ${{ github.sha }}."
          echo "pai-relay VPS auto-pulls main (deploy.sh cron, ~3 min), rebuilds + health-checks + auto-rollback."

      - name: Wait for VPS pull-deploy
        run: sleep 240

      - name: Health check (api.rivaflow.app -> VPS)
        run: |
          code=000
          for i in $(seq 1 24); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://api.rivaflow.app/health || true)
            [ "$code" = "200" ] && { echo "healthy after $((i*5))s"; break; }
            echo "attempt $i: HTTP $code"; sleep 5
          done
          [ "$code" = "200" ] || { echo "FAILED"; exit 1; }

      - name: Smoke tests
        run: |
          curl -s https://api.rivaflow.app/health | jq '{status,database,version}'
          web=$(curl -s -o /dev/null -w "%{http_code}" https://rivaflow.app/)
          echo "web: HTTP $web"
          [ "$web" = "200" ] || echo "::warning::web returned $web"

  # Rollback is a manual op on the VPS (GH runners can't reach the firewalled host):
  #   ssh groot-vps 'cd /opt/rivaflow && git reset --hard <prev-sha> && sudo docker compose -f docker-compose.prod.yml up -d --build'
  # DNS rollback to Render: api.rivaflow.app -> rivaflow-api-v2.onrender.com ; rivaflow.app -> A 216.24.57.1
