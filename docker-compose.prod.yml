name: rivaflow

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: rivaflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: rivaflow
    volumes:
      - pgdata:/var/lib/postgresql   # postgres:18 convention (data in subdir)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rivaflow"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    env_file:
      - .env.prod
    environment:
      # these override anything in .env.prod
      PORT: "8000"
      ENV: production
      DATABASE_URL: postgresql://rivaflow:${DB_PASSWORD}@db:5432/rivaflow
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"   # internal only; tunnel reaches this
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
    ports:
      - "127.0.0.1:8080:80"     # internal only; tunnel reaches this
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    env_file:
      - .tunnel.env
    depends_on:
      - api
      - web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  pgdata:
